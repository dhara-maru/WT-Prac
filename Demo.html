<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Example</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            text-align: center;
        }
        th, td {
            border: 1px solid black;
            /* padding: 8px; */
        }
    </style>
</head>
<body>
    <table cellspacing="0" cellpadding="5">
        <tr>
            <th rowspan="2"> </th>
            <th colspan="2">average</th>
            <th rowspan="2">other category</th>
        </tr>
        <tr>
            <th>height</th>
            <th>weight</th>
        </tr>
        <tr>
            <td>males</td>
            <td>1.9</td>
            <td>0.003</td>
            <td>yyy</td>
        </tr>
        <tr>
            <td>females</td>
            <td>1.7</td>
            <td>0.002</td>
            <td>xxx</td>
        </tr>
    </table>
</body>
</html>
