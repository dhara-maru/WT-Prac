<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 50%;
            height: 70vh;
        }
        
    </style>
</head>
<body>
    <table border="1">
        <tr>
            <td valign="bottom" align="center">1</td>
            <td valign="top" align="left">2</td>
            <td rowspan="2" align="right" valign="bottom">3</td>
        </tr>
        <tr>
            <td colspan="2" align="right" valign="middle">4</td>
        </tr>
        <tr>
            <td rowspan="2" align="right" valign="top">6</td>
            <td colspan="2" align="center" valign="top">7</td>
        </tr>
        <tr>
            <td align="center" valign="bottom">8</td>
            <td align="center" valign="top">9</td>
        </tr>
    </table>
</body>
</html>
